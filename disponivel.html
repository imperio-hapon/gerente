<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard de Leads</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07090f;--s2:#111827;--s3:#1c2333;--bd:#1c2a3e;--tx:#d8e2f0;--mu:#4e6080;--a1:#22d3ee;--a2:#a78bfa;--gold:#f59e0b;--green:#10b981}
body{background:var(--bg);color:var(--tx);font-family:system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
#loading.hidden{display:none}
.spinner{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--a1);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#load-msg{font-size:.85rem;color:var(--mu)}
#load-err{font-size:.82rem;color:#f87171;max-width:460px;text-align:center;display:none;padding:16px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:10px;line-height:1.6;white-space:pre-wrap}

/* HEADER */
.hdr{padding:10px 24px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#0c1120;gap:16px;flex-wrap:wrap}
.hdr-title{font-weight:800;font-size:1.1rem;background:linear-gradient(90deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.hdr-kpis{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.kv{font-family:monospace;font-size:1.05rem;font-weight:700;color:var(--a1)}
.kl{font-size:.58rem;color:var(--mu);text-transform:uppercase;text-align:right}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.reload-btn{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:5px 12px;color:var(--mu);font-size:.72rem;cursor:pointer;white-space:nowrap}
.reload-btn:hover{color:var(--a1);border-color:var(--a1)}
.last-upd{font-size:.58rem;color:var(--mu);white-space:nowrap}

/* DATE FILTER BAR */
.dfilter{padding:8px 24px;border-bottom:1px solid var(--bd);display:flex;gap:6px;align-items:center;flex-shrink:0;background:#0a0f1c;flex-wrap:wrap}
.dfilter-label{font-size:.65rem;color:var(--mu);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.dfbtn{background:transparent;border:1px solid var(--bd);border-radius:7px;padding:5px 12px;color:var(--mu);font-size:.72rem;cursor:pointer;white-space:nowrap;transition:all .15s}
.dfbtn:hover{color:var(--tx);border-color:var(--a2)}
.dfbtn.on{background:rgba(34,211,238,.1);color:var(--a1);border-color:var(--a1)}
.dfsep{width:1px;height:18px;background:var(--bd);flex-shrink:0}
.date-range{display:none;align-items:center;gap:6px}
.date-range.on{display:flex}
.date-inp{background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:4px 8px;color:var(--tx);font-size:.72rem;outline:none;cursor:pointer}
.date-inp:focus{border-color:var(--a1)}
.date-range span{font-size:.7rem;color:var(--mu)}
.dfrange-apply{background:var(--a1);border:none;border-radius:7px;padding:5px 12px;color:#000;font-size:.72rem;font-weight:700;cursor:pointer}
.dfrange-apply:hover{opacity:.85}
.dflabel-active{font-size:.65rem;color:var(--a1);white-space:nowrap;font-weight:600}

/* TABS */
.tabs{display:flex;gap:4px;padding:0 24px;border-bottom:1px solid var(--bd);flex-shrink:0;background:#0c1120}
.tab{padding:9px 18px;font-size:.78rem;font-weight:600;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.05em;background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--a1);border-bottom-color:var(--a1)}
.sheet{display:none;flex:1;flex-direction:column;overflow:hidden}
.sheet.on{display:flex}

/* TOOLBAR */
.bar{padding:9px 24px;border-bottom:1px solid var(--bd);display:flex;gap:8px;align-items:center;flex-shrink:0;background:#0c1120}
.bar input{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:6px 12px;color:var(--tx);font-size:.8rem;outline:none}
.bar input:focus{border-color:var(--a1)}
.bar input::placeholder{color:var(--mu)}
.btn{background:transparent;border:1px solid var(--bd);border-radius:8px;padding:6px 12px;color:var(--mu);font-size:.73rem;cursor:pointer}
.btn.on{background:var(--s3);color:var(--a1);border-color:var(--a1)}
.cnt{font-size:.68rem;color:var(--mu);white-space:nowrap}

/* LIST + PANEL */
.wrap{display:flex;flex:1;overflow:hidden}
.lst{width:340px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--bd)}
.row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid rgba(28,42,62,.5);cursor:pointer;border-left:3px solid transparent}
.row:hover{background:var(--s2)}
.row.sel{background:var(--s3);border-left-color:var(--a1)}
.rk{font-size:.72rem;font-weight:700;color:var(--mu);width:20px;text-align:center;flex-shrink:0}
.rk.g{color:var(--gold)}
.info{flex:1;min-width:0}
.nm{font-size:.76rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini{height:3px;background:var(--bd);border-radius:2px;margin-top:3px;overflow:hidden}
.mini-f{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--a1),var(--a2))}
.nums{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.tot{font-family:monospace;font-size:.88rem;font-weight:700;color:var(--a1)}
.cv{font-size:.62rem;font-weight:700;padding:1px 5px;border-radius:4px;white-space:nowrap}
.cv.good{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.cv.zero{background:rgba(100,96,128,.1);color:var(--mu);border:1px solid var(--bd)}
.pnl{flex:1;overflow-y:auto;padding:24px}
.ph{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--mu);gap:12px;font-size:.88rem}
.ph-ico{font-size:44px}
.dtitle{font-size:1.5rem;font-weight:800;word-break:break-word}
.akpis{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.akpi{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:8px 14px;text-align:center}
.akpi.hl{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.06)}
.akv{font-family:monospace;font-size:1.1rem;font-weight:700;color:var(--a1);display:block;white-space:nowrap}
.akv.g{color:var(--green)}
.akl{font-size:.6rem;color:var(--mu);text-transform:uppercase}
.sec{font-size:.68rem;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;margin:18px 0 8px}
.dlist{display:flex;flex-direction:column;gap:5px}
.drow{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:9px 12px;display:flex;align-items:center;gap:8px}
.di{font-size:.72rem;font-weight:700;color:var(--mu);width:18px;text-align:center;flex-shrink:0}
.di.g{color:var(--gold)}
.dn{flex:1;font-size:.76rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dbar{width:120px;display:flex;gap:6px;align-items:center;flex-shrink:0}
.dbt{flex:1;height:5px;background:var(--bd);border-radius:3px;overflow:hidden}
.dbf{height:100%;border-radius:3px}
.dc{font-family:monospace;font-size:.86rem;font-weight:700;min-width:28px;text-align:right;flex-shrink:0}
.dp{font-size:.63rem;color:var(--mu);min-width:36px;text-align:right;flex-shrink:0}
.dx{font-size:.63rem;font-weight:700;min-width:52px;text-align:right;flex-shrink:0;padding:2px 5px;border-radius:4px}
.dx.good{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.dx.zero{color:var(--mu)}
.no-data{font-size:.8rem;color:var(--mu);padding:12px;background:var(--s2);border-radius:8px;border:1px solid var(--bd)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5)}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div id="load-msg">Conectando ao Google Sheets...</div>
  <div id="load-err"></div>
</div>

<div class="hdr">
  <div class="hdr-title">&#9889; DASHBOARD DE LEADS</div>
  <div class="hdr-kpis">
    <div><div class="kv" id="kv-total">--</div><div class="kl">total leads</div></div>
    <div><div class="kv" id="kv-tag10">--</div><div class="kl">tag 10 fechados</div></div>
    <div><div class="kv" id="kv-conv">--</div><div class="kl">conversao geral</div></div>
    <div class="hdr-right">
      <button class="reload-btn" onclick="loadData()">&#8635; Atualizar</button>
      <div class="last-upd" id="last-upd"></div>
    </div>
  </div>
</div>

<!-- DATE FILTER BAR -->
<div class="dfilter">
  <span class="dfilter-label">Periodo:</span>
  <button class="dfbtn on" id="df-all"   onclick="setFilter('all')">Acumulado</button>
  <button class="dfbtn"    id="df-week"  onclick="setFilter('week')">Esta semana</button>
  <button class="dfbtn"    id="df-2d"    onclick="setFilter('2d')">Ultimos 2 dias</button>
  <button class="dfbtn"    id="df-range" onclick="setFilter('range')">Periodo</button>
  <div class="dfsep"></div>
  <div class="date-range" id="range-inputs">
    <input type="date" id="dt-from" class="date-inp" onchange="applyRange()">
    <span>ate</span>
    <input type="date" id="dt-to"   class="date-inp" onchange="applyRange()">
  </div>
  <span class="dflabel-active" id="df-active-label"></span>
</div>

<div class="tabs">
  <button id="tab-agents" class="tab on" onclick="switchTab('agents')">&#128100; Agentes</button>
  <button id="tab-queues" class="tab"    onclick="switchTab('queues')">&#128203; Filas</button>
</div>

<div id="sheet-agents" class="sheet on">
  <div class="bar">
    <input id="aq" placeholder="Buscar agente..." oninput="aFilter()">
    <button id="abv" class="btn on" onclick="aSort('v')">Volume</button>
    <button id="aba" class="btn"    onclick="aSort('a')">A-Z</button>
    <button id="abc" class="btn"    onclick="aSort('c')">Conversao</button>
    <span id="acnt" class="cnt"></span>
  </div>
  <div class="wrap">
    <div class="lst" id="a-lst"></div>
    <div class="pnl" id="a-pnl"><div class="ph"><div class="ph-ico">&#128100;</div><div>Selecione um agente para ver detalhes</div></div></div>
  </div>
</div>

<div id="sheet-queues" class="sheet">
  <div class="bar">
    <input id="qq" placeholder="Buscar fila..." oninput="qFilter()">
    <button id="qbv" class="btn on" onclick="qSort('v')">Volume</button>
    <button id="qba" class="btn"    onclick="qSort('a')">A-Z</button>
    <button id="qbc" class="btn"    onclick="qSort('c')">Conversao</button>
    <span id="qcnt" class="cnt"></span>
  </div>
  <div class="wrap">
    <div class="lst" id="q-lst"></div>
    <div class="pnl" id="q-pnl"><div class="ph"><div class="ph-ico">&#128203;</div><div>Selecione uma fila para ver os agentes</div></div></div>
  </div>
</div>

<script>
var CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnlwiAP5sVy5NpzqrHObGJcqL6BsyzNoWNM8CC-iBD74TkHRDYVzFHOm14WEBv8mwXmn0N2lgX87pH/pub?gid=948821657&single=true&output=csv";

// ALL_ROWS = raw parsed rows (excluding header), used for date filtering
var ALL_ROWS = [];
var HEADERS  = [];

var AGENTS=[], QUEUES=[];
var A_TOTAL=0, Q_TOTAL=0, A_MAX=1, Q_MAX=1;
var COLORS=['#22d3ee','#a78bfa','#34d399','#fb923c','#f472b6','#60a5fa','#fbbf24','#4ade80','#e879f9','#2dd4bf','#facc15','#f87171'];
var state={sheet:'agents',a:{sm:'v',cur:null,vis:[]},q:{sm:'v',cur:null,vis:[]}};

// - date filter state -
var filterMode = 'all';  // 'all' | 'week' | '2d' | 'range'
var filterFrom = null;   // Date object
var filterTo   = null;   // Date object

// - helpers -
function h(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Parse "DD/MM/YYYY HH:mm" or "DD/MM/YYYY" -> "YYYY-MM-DD" string
function parseDate(str){
  if(!str) return null;
  str = str.trim();
  // try DD/MM/YYYY
  var m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m) return m[3]+'-'+pad(m[2])+'-'+pad(m[1]);
  // try YYYY-MM-DD
  m = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return m[1]+'-'+m[2]+'-'+m[3];
  return null;
}

function pad(n){ return String(n).length===1?'0'+n:String(n); }

// today as YYYY-MM-DD
function todayStr(){
  var d=new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}

function mondayStr(){
  var d=new Date();
  var day=d.getDay()||7; // 1=mon .. 7=sun
  d.setDate(d.getDate()-(day-1));
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}

function daysAgoStr(n){
  var d=new Date();
  d.setDate(d.getDate()-n);
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}

// - date filter UI -
function setFilter(mode){
  filterMode = mode;
  ['all','week','2d','range'].forEach(function(m){
    document.getElementById('df-'+m).className = 'dfbtn'+(mode===m?' on':'');
  });
  document.getElementById('range-inputs').className = 'date-range'+(mode==='range'?' on':'');

  if(mode==='range'){
    // set defaults if empty
    if(!document.getElementById('dt-from').value) document.getElementById('dt-from').value = daysAgoStr(6);
    if(!document.getElementById('dt-to').value)   document.getElementById('dt-to').value   = todayStr();
    filterFrom = document.getElementById('dt-from').value;
    filterTo   = document.getElementById('dt-to').value;
  } else {
    filterFrom = null; filterTo = null;
  }

  updateActiveLabel();
  rebuildFromRows();
}

function applyRange(){
  filterFrom = document.getElementById('dt-from').value;
  filterTo   = document.getElementById('dt-to').value;
  updateActiveLabel();
  rebuildFromRows();
}

function updateActiveLabel(){
  var lbl = '';
  if(filterMode==='all')   lbl = 'Todos os dados';
  else if(filterMode==='week') lbl = 'Seg '+mondayStr().slice(5).replace('-','/')+' - hoje';
  else if(filterMode==='2d')   lbl = daysAgoStr(1).slice(5).replace('-','/')+' - '+todayStr().slice(5).replace('-','/');
  else if(filterMode==='range' && filterFrom && filterTo) lbl = filterFrom.slice(5).replace('-','/')+'/'+filterFrom.slice(0,4)+' - '+filterTo.slice(5).replace('-','/')+'/'+filterTo.slice(0,4);
  document.getElementById('df-active-label').textContent = lbl;
}

// - check if a row passes the date filter -
function rowPassesFilter(dateStr){
  if(filterMode==='all') return true;
  if(!dateStr) return filterMode==='all';

  var from, to;
  if(filterMode==='week'){ from=mondayStr(); to=todayStr(); }
  else if(filterMode==='2d'){ from=daysAgoStr(1); to=todayStr(); }
  else if(filterMode==='range'){ from=filterFrom||''; to=filterTo||''; }
  else return true;

  return dateStr >= from && dateStr <= to;
}

// - data loading -
function loadData(){
  showLoading("Buscando dados do Google Sheets...");
  fetch(CSV_URL)
    .then(function(r){
      if(!r.ok) throw new Error("HTTP "+r.status);
      return r.text();
    })
    .then(function(csv){
      showLoading("Processando dados...");
      setTimeout(function(){
        try{
          var rows = parseCSV(csv);
          if(rows.length<2) throw new Error("Planilha vazia");
          HEADERS = rows[0].map(function(h){return h.trim().replace(/^"|"$/g,'');});
          ALL_ROWS = rows.slice(1);
          rebuildFromRows();
          hideLoading();
          document.getElementById('last-upd').textContent='Atualizado '+new Date().toLocaleTimeString('pt-BR');
        }catch(e){ showError("Erro ao processar:\n"+e.message); }
      },50);
    })
    .catch(function(e){
      showError("Nao foi possivel acessar a planilha.\n\n"+e.message);
    });
}

// - rebuild AGENTS + QUEUES from ALL_ROWS applying current filter -
function rebuildFromRows(){
  var iAgent   = HEADERS.indexOf('Currently Assigned to');
  var iQueue   = HEADERS.indexOf('Session Team');
  var iTag     = HEADERS.indexOf('Tag de encerramento');
  var iSession = HEADERS.indexOf('Session ID');
  // Try both possible column names for the date
  var iDate    = HEADERS.indexOf('Time of Chat Assignment');
  if(iDate===-1) iDate = HEADERS.indexOf('Chat Start In');
  if(iDate===-1) iDate = HEADERS.indexOf('Chat Start Time');
  // fallback: try to find any column with "Chat Start" or "Time of"
  if(iDate===-1){
    for(var hi=0;hi<HEADERS.length;hi++){
      if(HEADERS[hi].indexOf('Chat Start')===0||HEADERS[hi].indexOf('Time of Chat')===0){iDate=hi;break;}
    }
  }

  if(iAgent===-1) throw new Error("Coluna 'Currently Assigned to' nao encontrada. Cabecalhos: "+HEADERS.slice(0,8).join(', '));
  if(iQueue===-1) throw new Error("Coluna 'Session Team' nao encontrada.");

  var agQ={},agT={},agX={},qAg={},qAgX={},qT={},qX={};

  for(var i=0;i<ALL_ROWS.length;i++){
    var row = ALL_ROWS[i];
    if(row.length<2) continue;
    if(iSession>=0 && !(row[iSession]||'').trim()) continue;

    // date filter
    if(iDate>=0){
      var dstr = parseDate((row[iDate]||'').trim());
      if(!rowPassesFilter(dstr)) continue;
    }

    var agent = (row[iAgent]||'').trim();
    var queue = (row[iQueue]||'').trim()||'DEFAULT';
    var tag   = iTag>=0?(row[iTag]||'').trim():'';
    var isT10 = tag.indexOf('10')===0;

    if(!qT[queue]){qT[queue]=0;qX[queue]=0;qAg[queue]={};qAgX[queue]={};}
    qT[queue]++;
    if(isT10) qX[queue]++;

    if(agent){
      if(!agT[agent]){agT[agent]=0;agX[agent]=0;agQ[agent]={};}
      agT[agent]++;
      if(isT10) agX[agent]++;
      agQ[agent][queue]=(agQ[agent][queue]||0)+1;
      qAg[queue][agent]=(qAg[queue][agent]||0)+1;
      if(isT10) qAgX[queue][agent]=(qAgX[queue][agent]||0)+1;
    }
  }

  AGENTS=Object.keys(agT).map(function(n){
    var qs=Object.keys(agQ[n]).map(function(q){return{n:q,c:agQ[n][q]};}).sort(function(a,b){return b.c-a.c;});
    return{n:n,t:agT[n],x:agX[n]||0,q:qs};
  }).sort(function(a,b){return b.t-a.t;});

  QUEUES=Object.keys(qT).map(function(n){
    var ags=Object.keys(qAg[n]).map(function(a){return{n:a,c:qAg[n][a],x:qAgX[n][a]||0};}).sort(function(a,b){return b.c-a.c;});
    return{n:n,t:qT[n],x:qX[n]||0,a:ags};
  }).sort(function(a,b){return b.t-a.t;});

  A_TOTAL=AGENTS.reduce(function(s,a){return s+a.t;},0);
  Q_TOTAL=QUEUES.reduce(function(s,q){return s+q.t;},0);
  A_MAX=AGENTS.length?AGENTS[0].t:1;
  Q_MAX=QUEUES.length?QUEUES[0].t:1;

  var totalX=QUEUES.reduce(function(s,q){return s+q.x;},0);
  document.getElementById('kv-total').textContent=Q_TOTAL.toLocaleString('pt-BR');
  document.getElementById('kv-tag10').textContent=totalX.toLocaleString('pt-BR');
  document.getElementById('kv-conv').textContent=Q_TOTAL?(totalX/Q_TOTAL*100).toFixed(2)+'%':'--';

  // reset selections
  state.a.cur=null; state.q.cur=null;
  document.getElementById('a-pnl').innerHTML='<div class="ph"><div class="ph-ico">&#128100;</div><div>Selecione um agente para ver detalhes</div></div>';
  document.getElementById('q-pnl').innerHTML='<div class="ph"><div class="ph-ico">&#128203;</div><div>Selecione uma fila para ver os agentes</div></div>';

  aBuildVis(); aRender();
  qBuildVis(); qRender();
  updateActiveLabel();
}

// - CSV parser -
function parseCSV(text){
  var rows=[],lines=text.split('\n');
  for(var i=0;i<lines.length;i++){
    var line=lines[i].replace(/\r$/,'');
    if(!line.trim()) continue;
    var cols=[],cur='',inQ=false;
    for(var j=0;j<line.length;j++){
      var c=line[j];
      if(c==='"'){if(inQ&&line[j+1]==='"'){cur+='"';j++;}else inQ=!inQ;}
      else if(c===','&&!inQ){cols.push(cur);cur='';}
      else cur+=c;
    }
    cols.push(cur);
    rows.push(cols);
  }
  return rows;
}

// - UI helpers -
function showLoading(msg){
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('load-msg').textContent=msg||'Carregando...';
  document.getElementById('load-err').style.display='none';
  document.querySelector('.spinner').style.display='block';
}
function hideLoading(){document.getElementById('loading').classList.add('hidden');}
function showError(msg){
  document.getElementById('load-msg').textContent='';
  document.querySelector('.spinner').style.display='none';
  var el=document.getElementById('load-err');
  el.textContent=msg; el.style.display='block';
}
function switchTab(name){
  state.sheet=name;
  document.getElementById('tab-agents').className='tab'+(name==='agents'?' on':'');
  document.getElementById('tab-queues').className='tab'+(name==='queues'?' on':'');
  document.getElementById('sheet-agents').className='sheet'+(name==='agents'?' on':'');
  document.getElementById('sheet-queues').className='sheet'+(name==='queues'?' on':'');
}

/* - AGENTS - */
function aBuildVis(){
  var q=document.getElementById('aq').value.toLowerCase();
  var s=state.a; s.vis=[];
  for(var i=0;i<AGENTS.length;i++) if(!q||AGENTS[i].n.toLowerCase().indexOf(q)>=0) s.vis.push(i);
  if(s.sm==='a') s.vis.sort(function(a,b){return AGENTS[a].n.localeCompare(AGENTS[b].n,'pt');});
  else if(s.sm==='c') s.vis.sort(function(a,b){return (AGENTS[b].t?AGENTS[b].x/AGENTS[b].t:0)-(AGENTS[a].t?AGENTS[a].x/AGENTS[a].t:0);});
  else s.vis.sort(function(a,b){return AGENTS[b].t-AGENTS[a].t;});
}
function aSort(m){
  state.a.sm=m;
  document.getElementById('abv').className='btn'+(m==='v'?' on':'');
  document.getElementById('aba').className='btn'+(m==='a'?' on':'');
  document.getElementById('abc').className='btn'+(m==='c'?' on':'');
  aBuildVis(); aRender();
}
function aFilter(){aBuildVis();aRender();}
function aRender(){
  var vis=state.a.vis,cur=state.a.cur;
  document.getElementById('acnt').textContent=vis.length+' agente'+(vis.length!==1?'s':'');
  var out='';
  for(var k=0;k<vis.length;k++){
    var i=vis[k],a=AGENTS[i];
    var rank=i+1,w=(a.t/A_MAX*100).toFixed(1);
    var cvr=a.t?a.x/a.t:0,cvs=a.t?(cvr*100).toFixed(1)+'%':'--',cvc=cvr>0?'good':'zero';
    out+='<div class="row'+(cur===i?' sel':'')+'" data-i="'+i+'">';
    out+='<div class="rk'+(rank<=3?' g':'')+'">'+rank+'</div>';
    out+='<div class="info"><div class="nm" title="'+h(a.n)+'">'+h(a.n)+'</div>';
    out+='<div class="mini"><div class="mini-f" style="width:'+w+'%"></div></div></div>';
    out+='<div class="nums"><div class="tot">'+a.t.toLocaleString('pt-BR')+'</div>';
    out+='<div class="cv '+cvc+'">&#10003; '+cvs+'</div></div></div>';
  }
  document.getElementById('a-lst').innerHTML=out;
}
document.getElementById('a-lst').addEventListener('click',function(e){
  var el=e.target;
  while(el&&el.dataset.i===undefined) el=el.parentElement;
  if(el&&el.dataset.i!==undefined) aSel(parseInt(el.dataset.i,10));
});
function aSel(i){
  state.a.cur=i; aRender();
  var a=AGENTS[i],mq=a.q.length?a.q[0].c:1;
  var fn=a.q.length?a.q[0].n:'-'; if(fn.length>18) fn=fn.slice(0,18)+'...';
  var cvs=a.t?(a.x/a.t*100).toFixed(2)+'%':'--';
  var kpis='';
  kpis+='<div class="akpi"><span class="akv">'+a.t.toLocaleString('pt-BR')+'</span><span class="akl">total leads</span></div>';
  kpis+='<div class="akpi"><span class="akv">'+(A_TOTAL?((a.t/A_TOTAL)*100).toFixed(2)+'%':'--')+'</span><span class="akl">share</span></div>';
  kpis+='<div class="akpi hl"><span class="akv g">'+a.x+'</span><span class="akl">tag 10</span></div>';
  kpis+='<div class="akpi hl"><span class="akv g">'+cvs+'</span><span class="akl">conversao</span></div>';
  kpis+='<div class="akpi"><span class="akv">'+a.q.length+'</span><span class="akl">filas</span></div>';
  var rows='';
  for(var j=0;j<a.q.length;j++){
    var qq=a.q[j],col=COLORS[j%COLORS.length];
    var qp=(qq.c/a.t*100).toFixed(1),qw=(qq.c/mq*100).toFixed(1);
    rows+='<div class="drow"><div class="di'+(j<3?' g':'')+'">'+(j+1)+'</div>';
    rows+='<div class="dn" title="'+h(qq.n)+'">'+h(qq.n)+'</div>';
    rows+='<div class="dbar"><div class="dbt"><div class="dbf" style="width:'+qw+'%;background:'+col+'"></div></div></div>';
    rows+='<div class="dc" style="color:'+col+'">'+qq.c+'</div>';
    rows+='<div class="dp">'+qp+'%</div></div>';
  }
  document.getElementById('a-pnl').innerHTML=
    '<div class="dtitle">'+h(a.n)+'</div>'+
    '<div class="akpis">'+kpis+'</div>'+
    '<div class="sec">Distribuicao por fila</div>'+
    '<div class="dlist">'+rows+'</div>';
}

/* - QUEUES - */
function qBuildVis(){
  var q=document.getElementById('qq').value.toLowerCase();
  var s=state.q; s.vis=[];
  for(var i=0;i<QUEUES.length;i++) if(!q||QUEUES[i].n.toLowerCase().indexOf(q)>=0) s.vis.push(i);
  if(s.sm==='a') s.vis.sort(function(a,b){return QUEUES[a].n.localeCompare(QUEUES[b].n,'pt');});
  else if(s.sm==='c') s.vis.sort(function(a,b){return (QUEUES[b].t?QUEUES[b].x/QUEUES[b].t:0)-(QUEUES[a].t?QUEUES[a].x/QUEUES[a].t:0);});
  else s.vis.sort(function(a,b){return QUEUES[b].t-QUEUES[a].t;});
}
function qSort(m){
  state.q.sm=m;
  document.getElementById('qbv').className='btn'+(m==='v'?' on':'');
  document.getElementById('qba').className='btn'+(m==='a'?' on':'');
  document.getElementById('qbc').className='btn'+(m==='c'?' on':'');
  qBuildVis(); qRender();
}
function qFilter(){qBuildVis();qRender();}
function qRender(){
  var vis=state.q.vis,cur=state.q.cur;
  document.getElementById('qcnt').textContent=vis.length+' fila'+(vis.length!==1?'s':'');
  var out='';
  for(var k=0;k<vis.length;k++){
    var i=vis[k],q=QUEUES[i];
    var rank=i+1,w=(q.t/Q_MAX*100).toFixed(1);
    var cvr=q.t?q.x/q.t:0,cvs=q.t?(cvr*100).toFixed(1)+'%':'--',cvc=cvr>0?'good':'zero';
    out+='<div class="row'+(cur===i?' sel':'')+'" data-i="'+i+'">';
    out+='<div class="rk'+(rank<=3?' g':'')+'">'+rank+'</div>';
    out+='<div class="info"><div class="nm" title="'+h(q.n)+'">'+h(q.n)+'</div>';
    out+='<div class="mini"><div class="mini-f" style="width:'+w+'%"></div></div></div>';
    out+='<div class="nums"><div class="tot">'+q.t.toLocaleString('pt-BR')+'</div>';
    out+='<div class="cv '+cvc+'">&#10003; '+cvs+'</div></div></div>';
  }
  document.getElementById('q-lst').innerHTML=out;
}
document.getElementById('q-lst').addEventListener('click',function(e){
  var el=e.target;
  while(el&&el.dataset.i===undefined) el=el.parentElement;
  if(el&&el.dataset.i!==undefined) qSel(parseInt(el.dataset.i,10));
});
function qSel(i){
  state.q.cur=i; qRender();
  var q=QUEUES[i];
  var atrib=q.a.reduce(function(s,ag){return s+ag.c;},0);
  var sem=q.t-atrib;
  var cvs=q.t?(q.x/q.t*100).toFixed(2)+'%':'--';
  var kpis='';
  kpis+='<div class="akpi"><span class="akv">'+q.t.toLocaleString('pt-BR')+'</span><span class="akl">total leads</span></div>';
  kpis+='<div class="akpi"><span class="akv">'+(Q_TOTAL?((q.t/Q_TOTAL)*100).toFixed(2)+'%':'--')+'</span><span class="akl">share</span></div>';
  kpis+='<div class="akpi hl"><span class="akv g">'+q.x+'</span><span class="akl">tag 10</span></div>';
  kpis+='<div class="akpi hl"><span class="akv g">'+cvs+'</span><span class="akl">conversao</span></div>';
  kpis+='<div class="akpi"><span class="akv">'+q.a.length+'</span><span class="akl">agentes</span></div>';
  if(sem>0) kpis+='<div class="akpi"><span class="akv">'+sem.toLocaleString('pt-BR')+'</span><span class="akl">sem agente</span></div>';
  var rows='';
  if(!q.a.length){
    rows='<div class="no-data">Nenhum agente atribuido nesta fila.</div>';
  } else {
    var mxc=q.a[0].c;
    for(var j=0;j<q.a.length;j++){
      var ag=q.a[j],col=COLORS[j%COLORS.length];
      var ap=(ag.c/q.t*100).toFixed(1),aw=(ag.c/mxc*100).toFixed(1);
      var agcv=ag.c?(ag.x/ag.c*100).toFixed(1)+'%':'--';
      var agcc=ag.x>0?'good':'zero';
      rows+='<div class="drow"><div class="di'+(j<3?' g':'')+'">'+(j+1)+'</div>';
      rows+='<div class="dn" title="'+h(ag.n)+'">'+h(ag.n)+'</div>';
      rows+='<div class="dbar"><div class="dbt"><div class="dbf" style="width:'+aw+'%;background:'+col+'"></div></div></div>';
      rows+='<div class="dc" style="color:'+col+'">'+ag.c+'</div>';
      rows+='<div class="dp">'+ap+'%</div>';
      rows+='<div class="dx '+agcc+'">&#10003; '+agcv+'</div></div>';
    }
  }
  document.getElementById('q-pnl').innerHTML=
    '<div class="dtitle">'+h(q.n)+'</div>'+
    '<div class="akpis">'+kpis+'</div>'+
    '<div class="sec">Agentes nesta fila</div>'+
    '<div class="dlist">'+rows+'</div>';
}

loadData();
</script>
